<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>할리갈리</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff4757;
            --secondary-color: #ff6b81;
            --background-start: #ff9a9e;
            --background-end: #fecfef;
            --text-color: #2f3542;
            --btn-easy: #2ed573;
            --btn-normal: #ffa502;
            --btn-hard: #ff4757;
            --btn-back: #a4b0be;
            --table-felt: #1b7a43;
            --table-wood: #5e3b22;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, var(--background-start) 0%, var(--background-end) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            overflow: hidden;
            user-select: none;
        }

        .hidden { display: none !important; }

        /* 메뉴 공통 스타일 */
        .menu-container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 4rem 6rem;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            animation: fadeIn 0.5s ease-out;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-width: 400px;
            z-index: 10;
        }

        h1 { font-family: 'Jua', sans-serif; font-size: 5.5rem; color: white; text-shadow: 3px 6px 15px rgba(0, 0, 0, 0.15); margin-bottom: 2rem; letter-spacing: 3px; }
        h2 { font-family: 'Jua', sans-serif; font-size: 3.5rem; color: white; text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.15); margin-bottom: 2rem; }

        .btn {
            font-family: 'Jua', sans-serif; font-size: 2rem; padding: 1rem 3rem; color: white; border: none; border-radius: 50px; cursor: pointer; transition: all 0.3s; width: 100%; text-transform: uppercase;
        }
        .start-btn { background: linear-gradient(45deg, var(--primary-color), var(--secondary-color)); box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4); font-size: 2.5rem; padding: 1.2rem 4rem; }
        .btn-easy { background: var(--btn-easy); box-shadow: 0 6px 20px rgba(46, 213, 115, 0.4); }
        .btn-normal { background: var(--btn-normal); box-shadow: 0 6px 20px rgba(255, 165, 2, 0.4); }
        .btn-hard { background: var(--btn-hard); box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4); }
        .btn-back { background: var(--btn-back); box-shadow: 0 6px 20px rgba(164, 176, 190, 0.4); margin-top: 1rem; font-size: 1.5rem; }

        .btn:hover { transform: translateY(-5px) scale(1.05); filter: brightness(1.1); }
        .btn:active { transform: translateY(2px) scale(0.95); }

        /* 게임 화면 컨테이너 */
        .game-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.6); z-index: 100; animation: fadeIn 0.8s ease-out; perspective: 1200px;
        }

        .poker-table {
            width: 850px; height: 850px; background-color: var(--table-felt); border: 35px solid var(--table-wood); border-radius: 60px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 0 50px rgba(0, 0, 0, 0.4); position: relative;
        }

        /* 4방향 좌석 배치 */
        .seat { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 15px; transition: all 0.3s; }
        .seat-top { top: 30px; left: 50%; transform: translateX(-50%); }
        .seat-left { left: 30px; top: 50%; transform: translateY(-50%); }
        .seat-right { right: 30px; top: 50%; transform: translateY(-50%); }
        .seat-bottom { bottom: 30px; left: 50%; transform: translateX(-50%); }

        .seat-cards { display: flex; gap: 20px; align-items: center; }

        /* 플레이어 정보 라벨 */
        .player-info {
            color: white; font-family: 'Jua', sans-serif; font-size: 1.5rem; background: rgba(0,0,0,0.5); padding: 5px 20px; border-radius: 20px; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        .active-me { background: #ff4757; } /* 내 라벨 강조 */

        /* 턴 하이라이트 빛나는 효과 */
        .active-turn .deck .card-back {
            box-shadow: 0 0 25px 10px #2ecc71, 0 5px 15px rgba(0,0,0,0.6);
            border-color: #2ecc71;
            transform: translateY(-5px);
        }

        /* 카드 공통/뒷면 */
        .deck, .field-card { width: 100px; height: 140px; cursor: pointer; perspective: 1000px; }
        
        .card-back {
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #1e3799 25%, transparent 25%) -20px 0, linear-gradient(225deg, #1e3799 25%, transparent 25%) -20px 0, linear-gradient(315deg, #1e3799 25%, transparent 25%), linear-gradient(45deg, #1e3799 25%, transparent 25%);
            background-size: 40px 40px; background-color: #0c2461; border: 6px solid white; border-radius: 12px;
            box-shadow: 1px 1px 0px white, 2px 2px 0px #aaa, 3px 3px 0px white, 4px 4px 0px #aaa, 5px 10px 20px rgba(0,0,0,0.6);
            transition: all 0.2s ease;
        }

        /* 카드 앞면 (과일 표시) */
        .card-front {
            width: 100%; height: 100%; background-color: white; border: 6px solid #f1f2f6; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); display: flex; flex-wrap: wrap; justify-content: center; align-content: center; padding: 5px; animation: flipIn 0.3s ease-out;
        }
        .card-front span {
            display: inline-flex; justify-content: center; align-items: center; width: 42%; height: 30%; font-size: 2.2rem; filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.2)); margin: 2%;
        }

        /* 종 (정중앙) */
        .bell-wrapper { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; justify-content: center; align-items: center; z-index: 10; }
        .bell {
            width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #ffffff 0%, #dcdde1 30%, #7f8fa6 80%, #353b48 100%); border: none; box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset -5px -10px 20px rgba(0,0,0,0.5); cursor: pointer; position: relative; transition: transform 0.1s;
        }
        .bell::before {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 45px; height: 45px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ff4757, #c0392b); box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(0,0,0,0.5);
        }
        .bell-base { position: absolute; width: 170px; height: 170px; border-radius: 50%; background-color: #2f3640; z-index: -1; box-shadow: 0 15px 30px rgba(0,0,0,0.8); }
        .bell:active { transform: scale(0.95); }

        /* 게임 알림창 */
        .announcement {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.85); color: #f1c40f; padding: 25px 50px; font-size: 3rem; border-radius: 30px; z-index: 200; font-family: 'Jua', sans-serif; text-align: center; white-space: nowrap; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; border: 3px solid #f1c40f; box-shadow: 0 0 30px rgba(241, 196, 15, 0.5);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes flipIn { from { transform: rotateY(-90deg); opacity: 0;} to { transform: rotateY(0); opacity: 1;} }
        @keyframes popIn { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body>
    <!-- 메인 메뉴 -->
    <div class="menu-container" id="main-menu">
        <h1>할리갈리</h1>
        <button class="btn start-btn" onclick="document.getElementById('main-menu').classList.add('hidden'); document.getElementById('difficulty-menu').classList.remove('hidden');">Start</button>
    </div>

    <!-- 난이도 선택 -->
    <div class="menu-container hidden" id="difficulty-menu">
        <h2>난이도 선택</h2>
        <button class="btn btn-easy" onclick="startGame('Easy')">Easy (상대 1명)</button>
        <button class="btn btn-normal" onclick="startGame('Normal')">Normal (상대 2명)</button>
        <button class="btn btn-hard" onclick="startGame('Hard')">Hard (상대 3명)</button>
        <button class="btn btn-back" onclick="location.reload()">처음으로</button>
    </div>

    <!-- 메인 게임 화면 -->
    <div class="game-screen hidden" id="game-screen">
        <div class="poker-table">
            <div class="announcement hidden" id="announcement"></div>
            
            <div class="seat seat-top hidden" id="seat-top">
                <div class="player-info">상대방 (상) 🃏<span class="card-count">0</span></div>
                <div class="seat-cards">
                    <div class="deck" onclick="userFlipCard('seat-top')"><div class="card-back"></div></div>
                    <div class="field-card hidden"></div>
                </div>
            </div>

            <div class="seat seat-left hidden" id="seat-left">
                <div class="player-info">상대방 (좌) 🃏<span class="card-count">0</span></div>
                <div class="seat-cards">
                    <div class="deck" onclick="userFlipCard('seat-left')"><div class="card-back"></div></div>
                    <div class="field-card hidden"></div>
                </div>
            </div>

            <div class="seat seat-right hidden" id="seat-right">
                <div class="player-info">상대방 (우) 🃏<span class="card-count">0</span></div>
                <div class="seat-cards">
                    <div class="field-card hidden"></div>
                    <div class="deck" onclick="userFlipCard('seat-right')"><div class="card-back"></div></div>
                </div>
            </div>

            <div class="bell-wrapper">
                <div class="bell-base"></div>
                <button class="bell" onclick="userRingBell()"></button>
            </div>

            <div class="seat seat-bottom hidden" id="seat-bottom">
                <div class="seat-cards">
                    <div class="deck" onclick="userFlipCard('seat-bottom')"><div class="card-back"></div></div>
                    <div class="field-card hidden"></div>
                </div>
                <div class="player-info active-me">나 🃏<span class="card-count">0</span></div>
            </div>
        </div>
    </div>

    <script>
        const fruits = ['🍇', '🍎', '🍌', '🥝'];
        let currentDifficulty = '';
        let players = [];
        let turnIndex = 0;
        let flipTimeout = null;
        let botRingTimeouts = [];
        let globalCardSeq = 0;
        let isBellCooldown = false;

        function startGame(difficulty) {
            currentDifficulty = difficulty;
            document.getElementById('difficulty-menu').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');

            players = [];
            // 기본 자리 배정 로직 (시계 방향 순서: Bottom -> Left -> Top -> Right)
            if (difficulty === 'Easy') {
                players.push({ id: 0, isBot: false, deck: [], fieldDeck: [], ui: 'seat-bottom', name: '나' });
                players.push({ id: 1, isBot: true, deck: [], fieldDeck: [], ui: 'seat-top', name: '상대방' });
            } else if (difficulty === 'Normal') {
                players.push({ id: 0, isBot: false, deck: [], fieldDeck: [], ui: 'seat-bottom', name: '나' });
                players.push({ id: 1, isBot: true, deck: [], fieldDeck: [], ui: 'seat-left', name: '상대 1' });
                players.push({ id: 2, isBot: true, deck: [], fieldDeck: [], ui: 'seat-right', name: '상대 2' });
            } else if (difficulty === 'Hard') {
                players.push({ id: 0, isBot: false, deck: [], fieldDeck: [], ui: 'seat-bottom', name: '나' });
                players.push({ id: 1, isBot: true, deck: [], fieldDeck: [], ui: 'seat-left', name: '상대 1' });
                players.push({ id: 2, isBot: true, deck: [], fieldDeck: [], ui: 'seat-top', name: '상대 2' });
                players.push({ id: 3, isBot: true, deck: [], fieldDeck: [], ui: 'seat-right', name: '상대 3' });
            }

            players.forEach(p => {
                for (let i = 0; i < 50; i++) {
                    p.deck.push({
                        fruit: fruits[Math.floor(Math.random() * fruits.length)],
                        count: Math.floor(Math.random() * 5) + 1
                    });
                }
                document.getElementById(p.ui).classList.remove('hidden');
                document.querySelector(`#${p.ui} .player-info`).innerHTML = `${p.name} 🃏<span class="card-count">50</span>장`;
            });

            turnIndex = 0;
            updateUI();
            evalBoard();
        }

        function createCardHTML(fruit, count) {
            let spans = '';
            for(let i=0; i<count; i++) spans += `<span>${fruit}</span>`;
            return `<div class="card-front">${spans}</div>`;
        }

        function updateUI() {
            players.forEach((p, idx) => {
                const seat = document.getElementById(p.ui);
                seat.querySelector('.card-count').innerText = p.deck.length;

                // 차례 테두리 효과
                if (idx === turnIndex) {
                    seat.classList.add('active-turn');
                } else {
                    seat.classList.remove('active-turn');
                }

                // 바닥 카드 (필드 카드) 표시
                const fieldEl = seat.querySelector('.field-card');
                if (p.fieldDeck.length > 0) {
                    const topCard = p.fieldDeck[p.fieldDeck.length - 1];
                    // 고유 ID를 비교해서 실제 카드가 새로 올라왔을 때만 애니메이션(DOM교체)을 발생시킴
                    if (fieldEl.dataset.cardId !== String(topCard.uniqueId)) {
                        fieldEl.innerHTML = createCardHTML(topCard.fruit, topCard.count);
                        fieldEl.classList.remove('hidden');
                        fieldEl.dataset.cardId = topCard.uniqueId;
                    }
                } else {
                    if (fieldEl.dataset.cardId) {
                        fieldEl.innerHTML = '';
                        fieldEl.classList.add('hidden');
                        delete fieldEl.dataset.cardId;
                    }
                }

                // 남은 카드가 없으면 뒷면(덱) 아이콘 숨김
                const deckEl = seat.querySelector('.deck');
                if (p.deck.length === 0) deckEl.classList.add('hidden');
                else deckEl.classList.remove('hidden');
            });
        }

        // 유저 차례일 때 자기 덱 클릭 시
        function userFlipCard(seatId) {
            const p = players[turnIndex];
            if (!p || p.isBot) return; // 내 턴이 아니거나 내가 봇이면 무시
            if (p.ui !== seatId) return; // 내 카드가 아닌 다른 곳 클릭 시 무시
            flipCardAction();
        }

        // 카드 하나 뒤집기 액션
        function flipCardAction() {
            clearBotTimeouts();

            const p = players[turnIndex];
            if (p.deck.length === 0) {
                // 남은 카드가 없으면 턴을 바로 넘김
                nextTurn();
                return;
            }

            const card = p.deck.shift(); // 위에서 한장 빼기
            card.uniqueId = ++globalCardSeq; // 필드에 낼때마다 고유 ID 부여하여 애니메이션 갱신 식별
            p.fieldDeck.push(card); // 바닥에 내기
            
            nextTurn();
        }

        function nextTurn() {
            turnIndex = (turnIndex + 1) % players.length;
            
            // 카드가 0장인 플레이어는 턴 건너뜀 (단, 모두가 0장이면 무한루프 방지)
            let loops = 0;
            while(players[turnIndex].deck.length === 0 && loops < players.length) {
                turnIndex = (turnIndex + 1) % players.length;
                loops++;
            }

            updateUI();
            evalBoard();

            // 다음 차례가 봇이면 자동으로 카드 뒤집기 예약 (합이 5가 아닐 때만)
            if (players[turnIndex].isBot && !isSum5()) {
                flipTimeout = setTimeout(() => {
                    flipCardAction();
                }, 800 + Math.random() * 400); // 봇이 카드를 뒤집는 딜레이 (약 1초)
            }
        }

        function isSum5() {
            let counts = { '🍇': 0, '🍎': 0, '🍌': 0, '🥝': 0 };
            players.forEach(p => {
                if (p.fieldDeck.length > 0) {
                    const topCard = p.fieldDeck[p.fieldDeck.length - 1];
                    counts[topCard.fruit] += topCard.count;
                }
            });

            for (let f in counts) {
                if (counts[f] === 5) return true;
            }
            return false;
        }

        function evalBoard() {
            if (checkGameOver()) return;

            if (isSum5()) {
                // 5개가 완성되었으므로, 현재 생존한 봇들에게 난이도별 타격 타이머 부여
                players.forEach((p, idx) => {
                    if (p.isBot && p.deck.length > 0) {
                        let delay = 2000;
                        if (currentDifficulty === 'Easy') delay = 1500 + Math.random() * 500;
                        if (currentDifficulty === 'Normal') delay = 1000 + Math.random() * 200;
                        if (currentDifficulty === 'Hard') delay = 800 + Math.random() * 200;
                        
                        const t = setTimeout(() => { executeRing(idx); }, delay);
                        botRingTimeouts.push(t);
                    }
                });
            }
        }

        function clearBotTimeouts() {
            if (flipTimeout) clearTimeout(flipTimeout);
            botRingTimeouts.forEach(t => clearTimeout(t));
            botRingTimeouts = [];
        }

        function userRingBell() {
            // 내가 종을 누름 (내 인덱스는 0)
            executeRing(0);
        }

        function executeRing(playerIdx) {
            if (isBellCooldown) return;
            isBellCooldown = true;
            setTimeout(() => { isBellCooldown = false; }, 625); // 0.625초(625ms) 동안 누구도 종을 칠 수 없게 지연

            clearBotTimeouts();
            const ringer = players[playerIdx];

            if (isSum5()) {
                // 성공: 싹쓸이
                let collectedCardCount = 0;
                players.forEach(p => {
                    collectedCardCount += p.fieldDeck.length;
                    // 플레이어의 뒷면 덱 밑으로 모두 추가
                    ringer.deck = ringer.deck.concat(p.fieldDeck); 
                    p.fieldDeck = [];
                });
                showAnnouncement(`${ringer.name} 성공! (${collectedCardCount}장 획득)`);
                
                // 승자가 다음 첫 턴을 가져감
                turnIndex = playerIdx;
                updateUI();

                if (!checkGameOver()) {
                    // 승리후 1.5초 휴식 후 다음 턴 진행
                    setTimeout(() => {
                        if(players[turnIndex].isBot) flipCardAction();
                    }, 1500);
                }

            } else {
                // 패널티: 잘못 침
                showAnnouncement(`${ringer.name} 패널티! (카드 1장씩 지불)`);
                players.forEach((p, idx) => {
                    if (idx !== playerIdx && ringer.deck.length > 0) {
                        p.deck.push(ringer.deck.shift()); // 내 덱에서 한장 빼서 상대 덱에 추가
                    }
                });
                updateUI();
                
                checkGameOver();
                // 패널티 이후 턴 유지 및 다시 진행
                if (players[turnIndex].isBot && !isSum5() && !checkGameOver()) {
                    flipTimeout = setTimeout(() => { flipCardAction(); }, 1000);
                }
            }
        }

        function showAnnouncement(msg) {
            const el = document.getElementById('announcement');
            el.innerText = msg;
            el.classList.remove('hidden');
            setTimeout(() => { el.classList.add('hidden'); }, 1500);
        }

        function checkGameOver() {
            // 승리 판정: 카드를 가진 플레이어가 1명 뿐이면 종료
            let alivePlayers = players.filter(p => p.deck.length > 0 || p.fieldDeck.length > 0);
            if (alivePlayers.length === 1) {
                clearBotTimeouts();
                showAnnouncement(`🎉게임 종료! 승리: ${alivePlayers[0].name}🎉`);
                setTimeout(() => { location.reload(); }, 4000); // 4초 후 메인으로 재부팅
                return true;
            }
            return false;
        }

        // 화면 크기에 맞게 게임판(포커 테이블) 크기 자동 조절 (스케일 업/다운)
        function resizeGameScreen() {
            const table = document.querySelector('.poker-table');
            if (table) {
                // 화면의 95% 크기에 꽉 차도록 비율 계산
                const scale = Math.min(window.innerWidth * 0.95 / 850, window.innerHeight * 0.95 / 850);
                table.style.transform = `scale(${scale})`;
            }
        }
        window.addEventListener('resize', resizeGameScreen);
        resizeGameScreen(); // 초기 로드 시 크기 적용
    </script>
</body>
</html>
