<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최민호 - 프로필</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Noto Sans KR', 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            transition: background-color 0.5s ease;
        }

        .secret-img {
            width: 450px;
            max-width: 90vw;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: none;
            cursor: pointer;
        }

        .secret-img.active {
            display: block;
        }

        .spinning {
            animation: spin 0.5s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* Ambient Background Glow */
        .background-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(200, 150, 20, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            transform: translate(-50%, -50%);
            z-index: 0;
            transition: background 0.5s ease;
        }

        /* Center Content */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 3rem 4rem;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1.5s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 95vw;
            max-height: 90vh;
            overflow-y: auto;
        }

        .card::-webkit-scrollbar {
            width: 6px;
        }

        .card::-webkit-scrollbar-thumb {
            background-color: rgba(255, 215, 0, 0.5);
            border-radius: 10px;
        }

        .name {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
        }

        .school {
            font-size: 1.5rem;
            font-weight: 400;
            color: #aaaaaa;
            letter-spacing: 2px;
        }

        .location {
            font-size: 1.2rem;
            font-weight: 400;
            color: #888888;
            letter-spacing: 1.5px;
            margin-top: 8px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Intro Screen Styles */
        .intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #a18cd1 100%);
            z-index: 2000;
            transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1), opacity 1.2s ease;
        }

        .intro-screen.hidden {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .hook-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        .hook-wrapper {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translate(-50%, 0px);
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: grab;
            z-index: 2010;
            touch-action: none;
        }

        .hook-wrapper:active {
            cursor: grabbing;
        }

        .hook-rope {
            width: 8px;
            height: 200vh;
            background: linear-gradient(90deg, #555 0%, #777 50%, #555 100%);
            position: absolute;
            bottom: 80%;
            /* connects nicely to the top of the hook */
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.4);
            border-radius: 4px;
        }

        .hook-icon {
            font-size: 6rem;
            user-select: none;
            filter: drop-shadow(0 15px 15px rgba(0, 0, 0, 0.3));
            transform: scaleX(-1);
        }

        .drop-zone {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 400px;
            height: 140px;
            border: 4px dashed rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            z-index: 2005;
        }

        .drop-zone.active {
            border-color: #FFD700;
            background: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            transform: translateX(-50%) scale(1.05);
            color: #FFD700;
        }

        /* Pineapples */
        .pineapple {
            position: absolute;
            font-size: 4rem;
            user-select: none;
            z-index: 5;
            transition: transform 0.3s ease, filter 0.3s ease, opacity 0.5s ease;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.2));
            animation: float 6s ease-in-out infinite;
        }

        .pineapple:hover {
            transform: scale(1.2) rotate(10deg) !important;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8));
        }

        .pineapple-btn {
            cursor: pointer;
        }

        /* Position variations */
        .p1 {
            top: 15%;
            left: 10%;
            animation-delay: 0s;
        }

        .p2 {
            top: 75%;
            left: 15%;
            animation-delay: 1s;
            font-size: 3rem;
        }

        .p3 {
            top: 60%;
            right: 10%;
            animation-delay: 2s;
            font-size: 5rem;
        }

        .p4 {
            top: 20%;
            right: 20%;
            animation-delay: 1.5s;
            font-size: 3.5rem;
        }

        .p5 {
            top: 85%;
            left: 40%;
            animation-delay: 0.5s;
            font-size: 4.5rem;
        }

        @keyframes float {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(5deg);
            }

            100% {
                transform: translateY(0px) rotate(0deg);
            }
        }

        /* Pages */
        .page {
            display: none;
        }

        .page.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.8s ease-out;
        }

        /* Next Page Styles */
        .next-title {
            color: #FFD700;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }

        .next-text {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #cccccc;
        }

        .back-btn {
            color: #FFD700;
            text-decoration: none;
            border: 1px solid rgba(255, 215, 0, 0.5);
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.3s;
            cursor: pointer;
            background: transparent;
            font-family: inherit;
            font-size: 1rem;
        }

        .back-btn:hover {
            color: #050505;
            background: #FFD700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        /* Project Cards */
        .project-cards {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px 20px;
            width: 220px;
            text-align: center;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .project-card:hover {
            transform: translateY(-10px) scale(1.05);
            background: rgba(255, 215, 0, 0.1);
            border-color: #FFD700;
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.3);
        }

        .project-emoji {
            font-size: 4rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.5));
        }

        .project-card h3 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            color: #FFD700;
            font-weight: 700;
        }

        .project-card p {
            font-size: 0.9rem;
            color: #cccccc;
            line-height: 1.4;
        }
    </style>
</head>

<body>

    <!-- Intro Hook Screen -->
    <div class="intro-screen" id="intro-screen">
        <div class="hook-container">
            <div class="hook-wrapper" id="draggable-hook">
                <div class="hook-rope"></div>
                <div class="hook-icon">🪝</div>
            </div>
            <div class="drop-zone" id="intro-drop-zone"></div>
        </div>
    </div>

    <div class="background-glow" id="bg-glow"></div>

    <div class="card">
        <!-- Page 1 (Home) -->
        <div id="page1" class="page active">
            <h1 class="name">최민호</h1>
            <p class="school">광성중학교 1학년</p>
            <p class="location">대한민국 서울시</p>
        </div>

        <!-- Page 2 (Next Page) -->
        <div id="page2" class="page">
            <img id="secret-photo" src="WIN_20260314_14_38_49_Pro.jpg" class="secret-img" alt="Secret Photo"
                onclick="goToHome()" title="클릭하면 홈으로 돌아갑니다">
            <button id="next-screen-btn" class="back-btn" style="display: none; margin-top: 20px;"
                onclick="goToPage3()">다음 화면으로</button>
        </div>

        <!-- Page 3 -->
        <div id="page3" class="page">
            <h1 class="next-title">내 프로젝트</h1>
            <p class="next-text">직접 만든 게임들을 플레이해 보세요! 🎮</p>

            <div class="project-cards">
                <a href="할리갈리.html" class="project-card">
                    <div class="project-emoji">🔔</div>
                    <h3>할리갈리 보드게임</h3>
                    <p>인공지능과 함께 즐기는<br>긴장감 넘치는 할리갈리!</p>
                </a>
                <a href="계란.html" class="project-card">
                    <div class="project-emoji">🥚</div>
                    <h3>계란 서바이벌</h3>
                    <p>WASD 조작!<br>거대한 맵에서 생존하세요!</p>
                </a>
                <a href="#" class="project-card" onclick="alert('준비 중입니다! 🍌')">
                    <div class="project-emoji">🍌</div>
                    <h3>나노 바나나</h3>
                    <p>제미나이를 이용해<br>이미지 생성</p>
                </a>
                <a href="#" class="project-card" onclick="alert('준비 중입니다! 🔬')">
                    <div class="project-emoji">🔬</div>
                    <h3>딥리서치</h3>
                    <p>깊이 있는 데이터 분석 및<br>탐색 리서치 프로젝트</p>
                </a>
                <a href="#" class="project-card" onclick="alert('준비 중입니다! 💻')">
                    <div class="project-emoji">💻</div>
                    <h3>노트북 LM</h3>
                    <p>가벼운 모바일 언어모델<br>직접 개발 및 내용 및 요점 정리</p>
                </a>
                <a href="https://github.com" target="_blank" class="project-card">
                    <div class="project-emoji">🐙</div>
                    <h3>GITHUB</h3>
                    <p>모든 소스 코드와<br>프로젝트 저장소 보기</p>
                </a>
            </div>

            <button class="back-btn" onclick="goToHome()" style="margin-top: 30px;">처음으로 돌아가기</button>
        </div>
    </div>

    <!-- Background Pineapples -->
    <div id="pineapples">
        <div class="pineapple p1">🍍</div>
        <div class="pineapple p2">🍍</div>

        <!-- This is the clickable pineapple -->
        <div class="pineapple p3 pineapple-btn" title="비밀의 파인애플" onclick="goToNext()">🍍</div>

        <div class="pineapple p4">🍍</div>
        <div class="pineapple p5">🍍</div>
    </div>

    <script>
        // Intro Screen Hook Logic
        const hook = document.getElementById('draggable-hook');
        const introDropZone = document.getElementById('intro-drop-zone');
        const introScreen = document.getElementById('intro-screen');

        let isDragging = false;
        let startX = 0;
        let startY = 0;
        let translateX = 0;
        let translateY = 0;

        hook.addEventListener('mousedown', startDrag);
        hook.addEventListener('touchstart', startDrag, { passive: false });

        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, { passive: false });

        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);

        function startDrag(e) {
            isDragging = true;
            if (e.type === 'touchstart') {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            } else {
                startX = e.clientX;
                startY = e.clientY;
            }
            hook.style.transition = 'none';
        }

        function drag(e) {
            if (!isDragging) return;
            e.preventDefault();

            let currentX, currentY;
            if (e.type === 'touchmove') {
                currentX = e.touches[0].clientX;
                currentY = e.touches[0].clientY;
            } else {
                currentX = e.clientX;
                currentY = e.clientY;
            }

            // X and Y distance traveled in this event
            let deltaX = currentX - startX;
            let deltaY = currentY - startY;

            // update start for next event
            startX = currentX;
            startY = currentY;

            // accumulate distance
            translateX += deltaX;
            translateY += deltaY;

            if (translateY < -20) translateY = -20;

            hook.style.transform = `translate(calc(-50% + ${translateX}px), ${translateY}px)`;

            const hookRect = hook.getBoundingClientRect();
            const dropRect = introDropZone.getBoundingClientRect();

            // Check bounding box intersection
            if (
                hookRect.bottom > dropRect.top + 40 &&
                hookRect.right > dropRect.left &&
                hookRect.left < dropRect.right
            ) {
                introDropZone.classList.add('active');
            } else {
                introDropZone.classList.remove('active');
            }
        }

        function endDrag(e) {
            if (!isDragging) return;
            isDragging = false;

            const hookRect = hook.getBoundingClientRect();
            const dropRect = introDropZone.getBoundingClientRect();

            if (
                hookRect.bottom > dropRect.top + 40 &&
                hookRect.right > dropRect.left &&
                hookRect.left < dropRect.right
            ) {
                hook.style.transition = 'transform 0.5s ease';
                hook.style.transform = `translate(calc(-50% + ${translateX}px), ${translateY}px) scale(0)`;

                setTimeout(() => {
                    introScreen.classList.add('hidden');
                }, 400);
            } else {
                hook.style.transition = 'transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                translateX = 0;
                translateY = 0;
                hook.style.transform = `translate(-50%, 0px)`;
                introDropZone.classList.remove('active');
            }
        }

        let rotationTimeout;

        function goToNext() {
            document.getElementById('page1').classList.remove('active');
            document.getElementById('page2').classList.add('active');

            // Hide pineapples on next page
            document.getElementById('pineapples').style.display = 'none';

            // Change background to red
            document.body.style.backgroundColor = 'red';
            document.getElementById('bg-glow').style.display = 'none';

            const photo = document.getElementById('secret-photo');
            photo.classList.add('active');
            photo.classList.add('spinning');

            clearTimeout(rotationTimeout);
            rotationTimeout = setTimeout(() => {
                photo.classList.remove('spinning');
                document.body.style.backgroundColor = '#050505';
                document.getElementById('bg-glow').style.display = 'block';
                // Show the 'Next Screen' button
                document.getElementById('next-screen-btn').style.display = 'inline-block';
            }, 8000);
        }

        function goToPage3() {
            document.getElementById('page2').classList.remove('active');
            document.getElementById('page3').classList.add('active');
        }

        function goToHome() {
            document.getElementById('page3').classList.remove('active');
            document.getElementById('page2').classList.remove('active');
            document.getElementById('page1').classList.add('active');

            // Reset next button
            const nextBtn = document.getElementById('next-screen-btn');
            if (nextBtn) nextBtn.style.display = 'none';

            // Show pineapples again
            document.getElementById('pineapples').style.display = 'block';

            // Reset state if returned early
            clearTimeout(rotationTimeout);
            document.body.style.backgroundColor = '#050505';
            document.getElementById('bg-glow').style.background = 'radial-gradient(circle, rgba(200, 150, 20, 0.15) 0%, rgba(0, 0, 0, 0) 70%)';
            document.getElementById('bg-glow').style.display = 'block';

            const photo = document.getElementById('secret-photo');
            if (photo) {
                photo.classList.remove('active');
                photo.classList.remove('spinning');
            }
        }
    </script>
</body>

</html>
