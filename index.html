<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최민호 - 프로필</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Noto Sans KR', 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            transition: background-color 0.5s ease;
        }

        .secret-img {
            width: 450px;
            max-width: 90vw;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: none;
            cursor: pointer;
        }

        .secret-img.active {
            display: block;
        }

        .spinning {
            animation: spin 0.5s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Ambient Background Glow */
        .background-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(200, 150, 20, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            transform: translate(-50%, -50%);
            z-index: 0;
            transition: background 0.5s ease;
        }

        /* Center Content */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 4rem 5rem;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1.5s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .name {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
        }

        .school {
            font-size: 1.5rem;
            font-weight: 400;
            color: #aaaaaa;
            letter-spacing: 2px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Pineapples */
        .pineapple {
            position: absolute;
            font-size: 4rem;
            user-select: none;
            z-index: 5;
            transition: transform 0.3s ease, filter 0.3s ease, opacity 0.5s ease;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.2));
            animation: float 6s ease-in-out infinite;
        }

        .pineapple:hover {
            transform: scale(1.2) rotate(10deg) !important;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8));
        }

        .pineapple-btn {
            cursor: pointer;
        }

        /* Position variations */
        .p1 { top: 15%; left: 10%; animation-delay: 0s; }
        .p2 { top: 75%; left: 15%; animation-delay: 1s; font-size: 3rem; }
        .p3 { top: 60%; right: 10%; animation-delay: 2s; font-size: 5rem; }
        .p4 { top: 20%; right: 20%; animation-delay: 1.5s; font-size: 3.5rem; }
        .p5 { top: 85%; left: 40%; animation-delay: 0.5s; font-size: 4.5rem; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* Pages */
        .page {
            display: none;
        }
        
        .page.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.8s ease-out;
        }

        /* Next Page Styles */
        .next-title {
            color: #FFD700;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }

        .next-text {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #cccccc;
        }

        .back-btn {
            color: #FFD700;
            text-decoration: none;
            border: 1px solid rgba(255, 215, 0, 0.5);
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.3s;
            cursor: pointer;
            background: transparent;
            font-family: inherit;
            font-size: 1rem;
        }

        .back-btn:hover {
            color: #050505;
            background: #FFD700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

    </style>
</head>
<body>

    <div class="background-glow" id="bg-glow"></div>

    <div class="card">
        <!-- Page 1 (Home) -->
        <div id="page1" class="page active">
            <h1 class="name">최민호</h1>
            <p class="school">광성중학교 1학년</p>
        </div>

        <!-- Page 2 (Next Page) -->
        <div id="page2" class="page">
            <img id="secret-photo" src="WIN_20260314_14_38_49_Pro.jpg" class="secret-img" alt="Secret Photo" onclick="goToHome()" title="클릭하면 홈으로 돌아갑니다">
            <button id="next-screen-btn" class="back-btn" style="display: none; margin-top: 20px;" onclick="goToPage3()">다음 화면으로</button>
        </div>

        <!-- Page 3 -->
        <div id="page3" class="page">
            <h1 class="next-title">세 번째 화면</h1>
            <p class="next-text">방문해 주셔서 감사합니다! 🚀</p>
            <button class="back-btn" onclick="goToHome()">처음으로 돌아가기</button>
        </div>
    </div>

    <!-- Background Pineapples -->
    <div id="pineapples">
        <div class="pineapple p1">🍍</div>
        <div class="pineapple p2">🍍</div>
        
        <!-- This is the clickable pineapple -->
        <div class="pineapple p3 pineapple-btn" title="비밀의 파인애플" onclick="goToNext()">🍍</div>
        
        <div class="pineapple p4">🍍</div>
        <div class="pineapple p5">🍍</div>
    </div>

    <script>
        let rotationTimeout;

        function goToNext() {
            document.getElementById('page1').classList.remove('active');
            document.getElementById('page2').classList.add('active');
            
            // Hide pineapples on next page
            document.getElementById('pineapples').style.display = 'none';
            
            // Change background to red
            document.body.style.backgroundColor = 'red';
            document.getElementById('bg-glow').style.display = 'none';

            const photo = document.getElementById('secret-photo');
            photo.classList.add('active');
            photo.classList.add('spinning');

            clearTimeout(rotationTimeout);
            rotationTimeout = setTimeout(() => {
                photo.classList.remove('spinning');
                document.body.style.backgroundColor = '#050505';
                document.getElementById('bg-glow').style.display = 'block';
                // Show the 'Next Screen' button
                document.getElementById('next-screen-btn').style.display = 'inline-block';
            }, 8000);
        }

        function goToPage3() {
            document.getElementById('page2').classList.remove('active');
            document.getElementById('page3').classList.add('active');
        }

        function goToHome() {
            document.getElementById('page3').classList.remove('active');
            document.getElementById('page2').classList.remove('active');
            document.getElementById('page1').classList.add('active');
            
            // Reset next button
            const nextBtn = document.getElementById('next-screen-btn');
            if (nextBtn) nextBtn.style.display = 'none';

            // Show pineapples again
            document.getElementById('pineapples').style.display = 'block';
            
            // Reset state if returned early
            clearTimeout(rotationTimeout);
            document.body.style.backgroundColor = '#050505';
            document.getElementById('bg-glow').style.background = 'radial-gradient(circle, rgba(200, 150, 20, 0.15) 0%, rgba(0, 0, 0, 0) 70%)';
            document.getElementById('bg-glow').style.display = 'block';
            
            const photo = document.getElementById('secret-photo');
            if (photo) {
                photo.classList.remove('active');
                photo.classList.remove('spinning');
            }
        }
    </script>
</body>
</html>
